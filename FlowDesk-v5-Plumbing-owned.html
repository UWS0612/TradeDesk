    }));
    frag.appendChild(block('Data Management',b=>{
      const btns=ce('div',{style:'display:flex;gap:8px;flex-wrap:wrap'});
      btns.appendChild(ce('button',{class:'btn btn-s',onClick:()=>{
        const data={customers:S.customers,sites:S.sites,jobs:S.jobs,quotes:S.quotes,invoices:S.invoices,expenses:S.expenses,inventory:S.inventory,payments:S.payments,inspections:S.inspections,settings:st};
        const a=document.createElement('a'); a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));
        a.download=`${CFG.name}-backup-${today()}.json`; a.click(); toast('Backup exported');
      }},'⬇ Export Backup'));
      const importBtn=ce('label',{class:'btn btn-s',style:'cursor:pointer'},'⬆ Import Backup');
      const fi=ce('input',{type:'file',accept:'.json',style:'display:none'});
      fi.addEventListener('change',ev=>{const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.customers){Object.assign(S,d);saveAll();if(d.settings)save('settings',d.settings);toast('Backup restored');render();}else toast('Invalid backup file','err');}catch{toast('Import failed','err');}};reader.readAsText(file);});
      importBtn.appendChild(fi); btns.appendChild(importBtn);
      btns.appendChild(ce('button',{class:'btn btn-d',onClick:()=>{if(!confirm('Clear ALL data? This cannot be undone.'))return;Object.keys(localStorage).filter(k=>k.startsWith(K)).forEach(k=>localStorage.removeItem(k));loadAll();render();toast('All data cleared');}},'⚠ Clear All Data'));
      b.appendChild(btns);
    }));
    frag.appendChild(block('About',b=>{
      const info=ce('div',{style:'font-size:12.5px;color:var(--muted);line-height:2'});
      info.innerHTML=`<strong style="color:var(--white)">${CFG.name} v4</strong> — ${CFG.tagline}<br>All data stored locally in this browser. No internet required. No subscription. No cloud.<br>Storage key: <code style="font-family:var(--mono);color:var(--a1);font-size:11px;background:var(--s2);padding:1px 6px;border-radius:3px">${K}</code>`;
      b.appendChild(info);
    }));
  }
  return frag;
};

// ── APP INIT ──────────────────────────────────────────────────────────────────

// ── IMPORT MODULE ─────────────────────────────────────────────────────────────
const TDImport = (() => {
  const FIELDS = {
    clients:[
      {key:'name',  label:'Customer name', aliases:['name','client_name','full_name','customer','fullname']},
      {key:'phone', label:'Phone',          aliases:['phone','mobile','contact','tel','telephone','ph']},
      {key:'email', label:'Email',          aliases:['email','email_address','e-mail','emailaddress']},
      {key:'suburb',label:'Suburb / City',  aliases:['suburb','city','location','town','area','locality']},
      {key:'abn',   label:'ABN',            aliases:['abn','businessnumber','business_number']},
      {key:'notes', label:'Notes',          aliases:['notes','note','comments','description','memo']},
    ],
    jobs:[
      {key:'client',     label:'Client name',     aliases:['client','client_name','customer','name']},
      {key:'description',label:'Job description',  aliases:['description','job','title','work','details']},
      {key:'date',       label:'Date',             aliases:['date','job_date','scheduled','booked']},
      {key:'value',      label:'Value ($)',        aliases:['value','amount','price','total','cost','quote']},
      {key:'status',     label:'Status',           aliases:['status','stage','state']},
      {key:'notes',      label:'Notes',            aliases:['notes','note','comments','memo']},
    ],
    invoices:[
      {key:'client', label:'Client name',    aliases:['client','client_name','customer','name','billed_to']},
      {key:'number', label:'Invoice number', aliases:['number','invoice','inv','invoice_no','ref']},
      {key:'date',   label:'Invoice date',   aliases:['date','invoice_date','issued','created']},
      {key:'amount', label:'Amount ($)',     aliases:['amount','total','value','price','cost']},
      {key:'status', label:'Payment status', aliases:['status','paid','payment','state']},
      {key:'notes',  label:'Notes',          aliases:['notes','note','memo','description']},
    ],
  };

  let st = {type:'clients',step:0,rawRows:[],headers:[],mapping:{},callback:null};

  const norm = s => String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');

  const autoMatch = headers => {
    const m = {};
    FIELDS[st.type].forEach(f => {
      const h = headers.find(h => f.aliases.some(a => norm(h)===a || norm(h).includes(a)));
      if (h) m[f.key] = h;
    });
    return m;
  };

  const parseCSV = text => {
    const lines = text.trim().split(/\r?\n/).filter(Boolean);
    if (lines.length < 2) return null;
    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
    const rows = lines.slice(1).map(line => {
      const cells = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c==='"') { inQ=!inQ; continue; }
        if (c===','&&!inQ) { cells.push(cur.trim()); cur=''; continue; }
        cur += c;
      }
      cells.push(cur.trim());
      const obj = {}; headers.forEach((h,i) => { obj[h]=cells[i]||''; }); return obj;
    });
    return {headers,rows};
  };

  const parseJSON = text => {
    try {
      const d = JSON.parse(text);
      const a = Array.isArray(d) ? d : (d.clients||d.jobs||d.invoices||d.records||Object.values(d)[0]);
      if (!Array.isArray(a)||!a.length) return null;
      return {headers:Object.keys(a[0]),rows:a};
    } catch { return null; }
  };

  const loadData = text => {
    const t = text.trim();
    let p = (t.startsWith('{')||t.startsWith('[')) ? parseJSON(t) : parseCSV(t);
    if (!p||!p.rows.length) return false;
    st.headers=p.headers; st.rawRows=p.rows; st.mapping=autoMatch(p.headers); return true;
  };

  const applyMapping = () => st.rawRows.map(row => {
    const obj = {_raw:row};
    FIELDS[st.type].forEach(f => { obj[f.key] = st.mapping[f.key] ? (row[st.mapping[f.key]]||'') : ''; });
    return obj;
  });

  const detectDupes = records => {
    const seen = new Set();
    return records.map(r => {
      const k = norm(r.name||r.client||'')+norm(r.phone||r.number||'');
      const d = k&&seen.has(k); if(k) seen.add(k); r._dupe=d; return r;
    });
  };

  const setProgStep = n => {
    for (let i=0;i<4;i++) {
      const el=document.getElementById('prog-'+i);
      el.classList.toggle('active',i===n); el.classList.toggle('done',i<n);
    }
  };

  const showStep = n => {
    document.querySelectorAll('.tdimport-step').forEach((s,i) => s.classList.toggle('active',i===n));
    setProgStep(n); st.step=n;
    const back=document.getElementById('tdimport-back'), next=document.getElementById('tdimport-next');
    if (n===0) { back.style.visibility='hidden'; next.textContent='Next: Map fields \u2192'; next.disabled=st.rawRows.length===0; }
    else if (n===1) { back.style.visibility='visible'; next.textContent='Next: Review \u2192'; next.disabled=false; }
    else if (n===2) { back.style.visibility='visible'; next.textContent='Confirm import \u2192'; next.disabled=false; renderPreview(); }
    else if (n===3) { back.style.visibility='hidden'; next.textContent='Close'; next.disabled=false; next.onclick=()=>TDImport.close(); }
  };

  const renderMapping = () => {
    const c=document.getElementById('tdimport-map-container'); c.innerHTML='';
    FIELDS[st.type].forEach(f => {
      const r=document.createElement('div'); r.className='tdimport-map-row';
      const cur=st.mapping[f.key]||'';
      r.innerHTML=`<div class="tdimport-map-label">${f.label}</div><div class="tdimport-map-arrow">\u2192</div>`+
        `<select class="tdimport-map-select${cur?' tdimport-map-match':''}" data-field="${f.key}" `+
        `onchange="TDImport._setMapping('${f.key}',this.value,this)">`+
        `<option value="">\u2014 skip \u2014</option>`+
        st.headers.map(h=>`<option value="${h}"${h===cur?' selected':''}>${h}</option>`).join('')+
        `</select>`;
      c.appendChild(r);
    });
  };

  const renderPreview = () => {
    const records=detectDupes(applyMapping());
    const mapped=FIELDS[st.type].filter(f=>st.mapping[f.key]);
    const dupes=records.filter(r=>r._dupe).length;
    document.getElementById('tdimport-summary').innerHTML=
      `<span>Total: <strong>${records.length}</strong></span>`+
      `<span>Ready: <strong>${records.length-dupes}</strong></span>`+
      (dupes?`<span style="color:var(--danger)">Dupes: <strong>${dupes}</strong></span>`:'')+
      `<span>Fields mapped: <strong>${mapped.length}</strong></span>`;
    document.getElementById('tdimport-preview-head').innerHTML=
      `<tr>${mapped.map(f=>`<th>${f.label}</th>`).join('')}<th>Status</th></tr>`;
    document.getElementById('tdimport-preview-body').innerHTML=
      records.slice(0,12).map(r=>
        `<tr class="${r._dupe?'tdimport-dupe':''}">`+
        mapped.map(f=>`<td>${r[f.key]||'<span style="color:var(--dim)">\u2014</span>'}</td>`).join('')+
        `<td>${r._dupe?'<span class="tdimport-dupe-badge">Dupe</span>':'<span class="tdimport-ok-badge">\u2713 New</span>'}</td></tr>`
      ).join('');
  };

  const renderDone = records => {
    const dupes=records.filter(r=>r._dupe).length, imp=records.length-dupes;
    document.getElementById('tdimport-done-stats').innerHTML=
      `<div class="tdimport-stat"><strong>${imp}</strong><span>Imported</span></div>`+
      (dupes?`<div class="tdimport-stat"><strong style="color:var(--danger)">${dupes}</strong><span>Skipped</span></div>`:'')+
      `<div class="tdimport-stat"><strong>${records.length}</strong><span>Total rows</span></div>`;
  };

  const commitRecords = clean => {
    if (!clean.length) return;
    if (st.type==='clients') {
      clean.forEach(r => {
        if (!r.name||!r.name.trim()) return;
        S.customers.push({id:uid(),name:r.name.trim(),phone:r.phone||'',email:r.email||'',
          suburb:r.suburb||'',abn:r.abn||'',notes:r.notes||'',createdAt:new Date().toISOString()});
      });
      save('customers',S.customers);
    } else if (st.type==='jobs') {
      clean.forEach(r => {
        if (!r.description&&!r.client) return;
        let cust = S.customers.find(c=>norm(c.name)===norm(r.client));
        if (!cust && r.client && r.client.trim()) {
          cust = {id:uid(),name:r.client.trim(),phone:'',email:'',suburb:'',abn:'',notes:'Imported with job data',createdAt:new Date().toISOString()};
          S.customers.push(cust);
        }
        S.jobs.push({id:uid(),customerId:cust?cust.id:'',jobType:r.description||'Imported Job',
          status:r.status||'Quoted',dateScheduled:r.date||today(),amount:parseFloat(r.value)||0,
          notes:r.notes||'',createdAt:new Date().toISOString()});
      });
      save('jobs',S.jobs);
    } else if (st.type==='invoices') {
      clean.forEach(r => {
        if (!r.amount&&!r.number) return;
        let cust = S.customers.find(c=>norm(c.name)===norm(r.client));
        if (!cust && r.client && r.client.trim()) {
          cust = {id:uid(),name:r.client.trim(),phone:'',email:'',suburb:'',abn:'',notes:'Imported with invoice data',createdAt:new Date().toISOString()};
          S.customers.push(cust);
        }
        const amt = parseFloat(r.amount)||0;
        S.invoices.push({id:uid(),customerId:cust?cust.id:'',number:r.number||('IMP-'+uid().slice(-4)),
          issueDate:r.date||today(),dueDate:'',status:r.status||'Unpaid',
          lineItems:[{id:uid(),desc:'Imported invoice',qty:1,unit:amt,tax:true}],
          notes:r.notes||'',createdAt:new Date().toISOString()});
      });
      save('invoices',S.invoices);
    }
  };

  return {
    open(callback) {
      TDImport.openFor('clients', callback);
    },
    openFor(type, callback) {
      const tabs=[...document.querySelectorAll('.tdimport-tab')];
      st={type:type||'clients',step:0,rawRows:[],headers:[],mapping:{},callback};
      document.getElementById('tdimport-paste').value='';
      tabs.forEach(t=>t.classList.remove('active'));
      const tabMap={clients:0,jobs:1,invoices:2};
      const idx=tabMap[st.type] ?? 0;
      tabs[idx]?.classList.add('active');
      document.getElementById('tdimport-type-badge').textContent=(st.type.charAt(0).toUpperCase()+st.type.slice(1));
      const next=document.getElementById('tdimport-next');
      next.disabled=true; next.onclick=()=>TDImport.next();
      document.getElementById('tdimport-back').style.visibility='hidden';
      showStep(0);
      document.getElementById('tdimport-backdrop').classList.add('open');
    },
    close() { document.getElementById('tdimport-backdrop').classList.remove('open'); },
    setType(type,tabEl) {
      st.type=type; st.mapping=autoMatch(st.headers);
      document.querySelectorAll('.tdimport-tab').forEach(t=>t.classList.remove('active'));
      tabEl.classList.add('active');
      document.getElementById('tdimport-type-badge').textContent=type.charAt(0).toUpperCase()+type.slice(1);
      if(st.step===1) renderMapping();
    },
    handleFile(event) {
      const file=event.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=e=>{const ok=loadData(e.target.result);document.getElementById('tdimport-next').disabled=!ok;if(!ok)alert('Could not parse file. Try a CSV or JSON export.');};
      reader.readAsText(file);
    },
    handlePaste(text) {
      if(text.trim().length<10){document.getElementById('tdimport-next').disabled=true;return;}
      document.getElementById('tdimport-next').disabled=!loadData(text);
    },
    _setMapping(field,value,el) { st.mapping[field]=value||undefined; el.classList.toggle('tdimport-map-match',!!value); },
    next() {
      if(st.step===0){ renderMapping(); showStep(1); }
      else if(st.step===1){ showStep(2); }
      else if(st.step===2){
        const records=detectDupes(applyMapping()), clean=records.filter(r=>!r._dupe);
        commitRecords(clean); renderDone(records); showStep(3);
        if(st.callback) st.callback({type:st.type,records:clean,raw:st.rawRows});
      }
    },
    back() { if(st.step>0) showStep(st.step-1); },
  };
})();

const init = () => { loadAll(); render(); };
document.addEventListener('DOMContentLoaded', init);
</script>
<div class="tdimport-backdrop" id="tdimport-backdrop">
  <div class="tdimport-modal">
    <div class="tdimport-header">
      <div class="tdimport-title">Import data<span class="tdimport-badge" id="tdimport-type-badge">Clients</span></div>
      <button class="tdimport-close" onclick="TDImport.close()">×</button>
    </div>
    <div class="tdimport-progress">
      <div class="tdimport-prog-step active" id="prog-0"><div class="tdimport-prog-dot">1</div><span class="tdimport-prog-label">Source</span></div>
      <div class="tdimport-prog-step" id="prog-1"><div class="tdimport-prog-dot">2</div><span class="tdimport-prog-label">Map</span></div>
      <div class="tdimport-prog-step" id="prog-2"><div class="tdimport-prog-dot">3</div><span class="tdimport-prog-label">Review</span></div>
      <div class="tdimport-prog-step" id="prog-3"><div class="tdimport-prog-dot">4</div><span class="tdimport-prog-label">Done</span></div>
    </div>
    <div class="tdimport-tabs">
      <button class="tdimport-tab active" onclick="TDImport.setType('clients',this)">Clients</button>
      <button class="tdimport-tab" onclick="TDImport.setType('jobs',this)">Jobs</button>
      <button class="tdimport-tab" onclick="TDImport.setType('invoices',this)">Invoices</button>
    </div>
    <div class="tdimport-body">
      <div class="tdimport-step active" id="tdimport-step-0">
        <div class="tdimport-zone" id="tdimport-zone">
          <input type="file" accept=".csv,.json,.txt" onchange="TDImport.handleFile(event)">
          <div class="tdimport-zone-icon">📂</div>
          <h3>Drop a file or click to browse</h3>
          <p>CSV or JSON export from your old software</p>
          <div class="tdimport-fmts"><span class="tdimport-fmt">CSV</span><span class="tdimport-fmt">JSON</span><span class="tdimport-fmt">TXT</span></div>
        </div>
        <span class="tdimport-label">Or paste data directly</span>
        <textarea class="tdimport-paste" id="tdimport-paste" placeholder="Paste CSV or JSON here…" oninput="TDImport.handlePaste(this.value)"></textarea>
      </div>
      <div class="tdimport-step" id="tdimport-step-1">
        <span class="tdimport-label">Match your columns to TradeDesk fields</span>
        <div class="tdimport-map" id="tdimport-map-container"></div>
      </div>
      <div class="tdimport-step" id="tdimport-step-2">
        <div class="tdimport-summary" id="tdimport-summary"></div>
        <div class="tdimport-preview-wrap">
          <table class="tdimport-preview"><thead id="tdimport-preview-head"></thead><tbody id="tdimport-preview-body"></tbody></table>
        </div>
      </div>
      <div class="tdimport-step" id="tdimport-step-3">
        <div class="tdimport-done">
          <div class="tdimport-done-icon">✓</div>
          <h3>Import complete</h3>
          <p>Records have been added to your data</p>
          <div class="tdimport-done-stats" id="tdimport-done-stats"></div>
        </div>
      </div>
    </div>
    <div class="tdimport-actions">
      <button class="tdimport-back" id="tdimport-back" onclick="TDImport.back()">← Back</button>
      <button class="tdimport-next" id="tdimport-next" onclick="TDImport.next()" disabled>Next: Map fields →</button>
    </div>
  </div>
</div>
</body>
